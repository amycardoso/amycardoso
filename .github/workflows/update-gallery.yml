name: Update Gallery

on:
  schedule:
    - cron: '0 4 * * *'   # daily at 1am Sao Paulo time
  workflow_dispatch:       # run manually from the Actions tab anytime

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Update gallery section
        run: node .github/scripts/update-gallery.js
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update gallery thumbnails [skip ci]"
          git push
